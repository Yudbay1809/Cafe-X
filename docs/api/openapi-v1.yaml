openapi: 3.1.0
info:
  title: Cafe-X POS API
  version: 1.1.0
  description: |
    Core API for POS, QR table ordering, shift, payment, offline sync, and manual SaaS billing v1.
servers:
  - url: https://api.cafex.local/api/v1
tags:
  - name: Health
  - name: Auth
  - name: Master
  - name: Shift
  - name: Orders
  - name: QR
  - name: Sync
  - name: Reports
  - name: Billing
  - name: Delivery
  - name: Loyalty
  - name: Analytics
  - name: Inventory
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [Health]
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
              examples:
                ok:
                  value:
                    success: true
                    message: OK
                    data:
                      status: healthy
                    server_time: '2026-04-08 09:30:00'

  /auth/login:
    post:
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponseData'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /master/products:
    get:
      tags: [Master]
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /master/tables:
    get:
      tags: [Master]
      responses:
        '200':
          description: Table list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /tables/upsert:
    post:
      tags: [Master]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableUpsertRequest'
      responses:
        '200':
          description: Table saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /shift/open:
    post:
      tags: [Shift]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftOpenRequest'
      responses:
        '200':
          description: Shift opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '409':
          description: Open shift already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /shift/close:
    post:
      tags: [Shift]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftCloseRequest'
      responses:
        '200':
          description: Shift closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: No open shift
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/create:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '200':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /orders/add-item:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderAddItemRequest'
      responses:
        '200':
          description: Item added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '409':
          description: Business conflict (stock/order state)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/update-item:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdateItemRequest'
      responses:
        '200':
          description: Item qty updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /orders/cancel-item:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCancelItemRequest'
      responses:
        '200':
          description: Item canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /orders/{orderId}:
    get:
      tags: [Orders]
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/pay:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPayRequest'
      responses:
        '200':
          description: Payment success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '409':
          description: Conflict (paid/canceled/insufficient)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/status:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '409':
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/cancel:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCancelRequest'
      responses:
        '200':
          description: Order canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /orders/move-table:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderMoveTableRequest'
      responses:
        '200':
          description: Order table moved

  /orders/merge:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderMergeRequest'
      responses:
        '200':
          description: Orders merged

  /orders/split:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderSplitRequest'
      responses:
        '200':
          description: Order split

  /orders/receipt:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderReceiptRequest'
      responses:
        '200':
          description: Receipt data

  /orders/reprint:
    post:
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderReceiptRequest'
      responses:
        '200':
          description: Receipt reprint data

  /qr/create-order:
    post:
      tags: [QR]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [table_token]
              properties:
                table_token:
                  type: string
                  maxLength: 80
                notes:
                  type: string
                  maxLength: 255
      responses:
        '200':
          description: QR order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /qr/menu/{tableToken}:
    get:
      tags: [QR]
      security: []
      parameters:
        - in: path
          name: tableToken
          required: true
          schema:
            type: string
      responses:
        '200':
          description: QR menu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /qr/place-order:
    post:
      tags: [QR]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [table_token, items]
              properties:
                table_token:
                  type: string
                  maxLength: 80
                notes:
                  type: string
                  maxLength: 255
                items:
                  type: array
                  items:
                    type: object
                    required: [product_id, qty]
                    properties:
                      product_id:
                        type: integer
                        minimum: 1
                      qty:
                        type: integer
                        minimum: 1
                      notes:
                        type: string
                        maxLength: 255
      responses:
        '200':
          description: QR place order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /qr/order-status/{tableToken}/{orderId}:
    get:
      tags: [QR]
      security: []
      parameters:
        - in: path
          name: tableToken
          required: true
          schema:
            type: string
        - in: path
          name: orderId
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: QR order status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /sync/pull:
    post:
      tags: [Sync]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                device_id:
                  type: string
                  maxLength: 100
                cursor:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Pull sync payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /sync/push:
    post:
      tags: [Sync]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                device_id:
                  type: string
                  maxLength: 100
                events:
                  type: array
                  items:
                    type: object
                    required: [type, payload]
                    properties:
                      type:
                        type: string
                      payload:
                        type: object
                        additionalProperties: true
      responses:
        '200':
          description: Push sync result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /reports/summary:
    get:
      tags: [Reports]
      responses:
        '200':
          description: Summary report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '402':
          description: Feature not included in current package
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reports/shift:
    get:
      tags: [Reports]
      parameters:
        - in: query
          name: shift_id
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Shift report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /billing/subscription:
    get:
      tags: [Billing]
      summary: Get active subscription and available plans
      responses:
        '200':
          description: Active subscription and plans
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          subscription:
                            $ref: '#/components/schemas/BillingSubscription'
                          plans:
                            type: array
                            items:
                              $ref: '#/components/schemas/BillingPlan'
              examples:
                success:
                  value:
                    success: true
                    message: OK
                    data:
                      subscription:
                        id: 2
                        status: active
                        period_start: '2026-04-01 00:00:00'
                        period_end: '2026-05-01 00:00:00'
                        plan_code: pro
                        plan_name: Pro
                        price_monthly: 599000
                        feature_flags_json: '{"multi.outlet":true}'
                      plans:
                        - id: 1
                          code: basic
                          name: Basic
                          price_monthly: 299000
                          is_active: 1
                        - id: 2
                          code: pro
                          name: Pro
                          price_monthly: 599000
                          is_active: 1
                    server_time: '2026-04-08 09:30:00'

    post:
      tags: [Billing]
      summary: Set, upgrade, or downgrade plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingSubscriptionUpsertRequest'
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
              examples:
                success:
                  value:
                    success: true
                    message: Subscription updated
                    data:
                      subscription_id: 5
                    server_time: '2026-04-08 09:30:00'
        '403':
          description: Forbidden (permission)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /billing/invoices:
    get:
      tags: [Billing]
      summary: List tenant invoices
      responses:
        '200':
          description: Invoice list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/BillingInvoice'

    post:
      tags: [Billing]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingCreateInvoiceRequest'
      responses:
        '200':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
              examples:
                success:
                  value:
                    success: true
                    message: Invoice created
                    data:
                      invoice_id: 11
                    server_time: '2026-04-08 09:30:00'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /billing/invoices/{id}:
    patch:
      tags: [Billing]
      summary: Update invoice status/notes/due date
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingUpdateInvoiceRequest'
      responses:
        '200':
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /billing/invoices/{id}/mark-paid:
    post:
      tags: [Billing]
      summary: Mark invoice as paid
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Invoice marked paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /billing/demo/reset:
    post:
      tags: [Billing]
      summary: Reset demo tenant data to baseline
      description: Allowed only for demo tenant flow and guarded by `perm:demo.reset` + `feature:demo.reset`.
      responses:
        '200':
          description: Demo tenant reset completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
              examples:
                success:
                  value:
                    success: true
                    message: Demo tenant reset completed
                    data:
                      tenant_id: 1
                    server_time: '2026-04-08 09:30:00'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 100
        password:
          type: string
          maxLength: 255
        device_name:
          type: string
          maxLength: 100

    LoginResponseData:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
        user:
          type: object
          properties:
            username:
              type: string
            role:
              type: string

    TableUpsertRequest:
      type: object
      required: [table_code, table_name]
      properties:
        table_code:
          type: string
          maxLength: 50
        table_name:
          type: string
          maxLength: 100
        is_active:
          type: boolean
        qr_token:
          type: string
          maxLength: 80

    ShiftOpenRequest:
      type: object
      required: [opening_cash]
      properties:
        opening_cash:
          type: number
          minimum: 0
        notes:
          type: string
          maxLength: 255

    ShiftCloseRequest:
      type: object
      required: [closing_cash]
      properties:
        closing_cash:
          type: number
          minimum: 0
        notes:
          type: string
          maxLength: 255

    OrderCreateRequest:
      type: object
      properties:
        source:
          type: string
          enum: [POS, QR]
          default: POS
        table_code:
          type: string
          maxLength: 50
        notes:
          type: string
          maxLength: 255

    OrderAddItemRequest:
      type: object
      required: [order_id, product_id, qty]
      properties:
        order_id:
          type: integer
          minimum: 1
        product_id:
          type: integer
          minimum: 1
        qty:
          type: integer
          minimum: 1
          maximum: 1000
        notes:
          type: string
          maxLength: 255

    OrderUpdateItemRequest:
      type: object
      required: [order_id, product_id, qty]
      properties:
        order_id:
          type: integer
          minimum: 1
        product_id:
          type: integer
          minimum: 1
        qty:
          type: integer
          minimum: 1
        notes:
          type: string
          maxLength: 255

    OrderCancelItemRequest:
      type: object
      required: [order_id, product_id]
      properties:
        order_id:
          type: integer
          minimum: 1
        product_id:
          type: integer
          minimum: 1
        reason:
          type: string
          maxLength: 255

    OrderPayRequest:
      type: object
      required: [order_id, method, amount]
      properties:
        order_id:
          type: integer
          minimum: 1
        method:
          type: string
          enum: [cash, qris, transfer, card, other]
        amount:
          type: number
          minimum: 0
        reference_no:
          type: string
          maxLength: 100

    OrderStatusRequest:
      type: object
      required: [order_id, status]
      properties:
        order_id:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [new, preparing, ready, served, paid, canceled]

    OrderCancelRequest:
      type: object
      required: [order_id]
      properties:
        order_id:
          type: integer
          minimum: 1
        reason:
          type: string
          maxLength: 255

    OrderMoveTableRequest:
      type: object
      required: [order_id, to_table_code]
      properties:
        order_id:
          type: integer
          minimum: 1
        to_table_code:
          type: string
          maxLength: 50

    OrderMergeRequest:
      type: object
      required: [source_order_id, target_order_id]
      properties:
        source_order_id:
          type: integer
          minimum: 1
        target_order_id:
          type: integer
          minimum: 1

    OrderSplitRequest:
      type: object
      required: [order_id, items]
      properties:
        order_id:
          type: integer
          minimum: 1
        items:
          type: array
          items:
            type: object
            required: [product_id, qty]
            properties:
              product_id:
                type: integer
                minimum: 1
              qty:
                type: integer
                minimum: 1

    OrderReceiptRequest:
      type: object
      required: [order_id]
      properties:
        order_id:
          type: integer
          minimum: 1

    BillingPlan:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
          enum: [basic, pro, premium]
        name:
          type: string
        price_monthly:
          type: number
        feature_flags_json:
          type: string
          nullable: true
        is_active:
          type: integer
          enum: [0, 1]

    BillingSubscription:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [trial, active, past_due, canceled]
        period_start:
          type: string
        period_end:
          type: string
          nullable: true
        plan_code:
          type: string
          enum: [basic, pro, premium]
        plan_name:
          type: string
        price_monthly:
          type: number
        feature_flags_json:
          type: string
          nullable: true

    BillingInvoice:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: integer
        invoice_no:
          type: string
        amount:
          type: number
        due_date:
          type: string
        status:
          type: string
          enum: [draft, sent, paid, void, overdue]
        notes:
          type: string
          nullable: true
        paid_at:
          type: string
          nullable: true
        created_at:
          type: string

    BillingSubscriptionUpsertRequest:
      type: object
      required: [plan_code]
      properties:
        plan_code:
          type: string
          enum: [basic, pro, premium]
        status:
          type: string
          enum: [trial, active, past_due, canceled]
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time

    BillingCreateInvoiceRequest:
      type: object
      properties:
        invoice_no:
          type: string
          maxLength: 60
        due_date:
          type: string
          format: date
        status:
          type: string
          enum: [draft, sent, paid, void, overdue]
        notes:
          type: string
          maxLength: 2000
        items:
          type: array
          items:
            type: object
            required: [description, qty, price]
            properties:
              description:
                type: string
                maxLength: 160
              qty:
                type: integer
                minimum: 1
                maximum: 9999
              price:
                type: number
                minimum: 0
      example:
        due_date: '2026-04-30'
        status: sent
        notes: Invoice April 2026
        items:
          - description: Langganan Pro April
            qty: 1
            price: 599000

    BillingUpdateInvoiceRequest:
      type: object
      properties:
        status:
          type: string
          enum: [draft, sent, paid, void, overdue]
        due_date:
          type: string
          format: date
        notes:
          type: string
          maxLength: 2000

    OkResponse:
      type: object
