name: frontend-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  customer-next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/customer-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/customer-next/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e

  admin-next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/admin-next/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
