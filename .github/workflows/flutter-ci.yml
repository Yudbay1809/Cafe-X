name: flutter-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pos-flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pos-flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
