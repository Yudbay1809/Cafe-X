name: ci-cd

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: dbpemesanan
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          cache: composer
      - name: Install deps
        run: composer install --no-interaction --prefer-dist
      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=dbpemesanan" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=" >> .env
      - name: Lint
        run: php -l app/Services/PosService.php
      - name: Pint (format check)
        run: ./vendor/bin/pint --test
      - name: PHPStan (Larastan)
        run: ./vendor/bin/phpstan analyse --configuration=phpstan.neon
      - name: Test
        run: php artisan test

  deploy-gate:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy checklist
        run: |
          echo "Build artifact ready"
          echo "Run migrate --force on target"
          echo "Call /api/v1/health and verify status"
          echo "If health fails, trigger rollback gate"
